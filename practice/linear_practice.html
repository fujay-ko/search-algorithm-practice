<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>循序搜尋 — 練習</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--panel:#1a1d2e;--panel2:#22263a;
  --accent:#4f8ef7;--green:#34d399;--red:#f87171;
  --yellow:#fbbf24;--orange:#fb923c;--text:#e8eaf6;--muted:#6b7280;
  --elim:#1e2135;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,.04)1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.04)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{max-width:900px;margin:0 auto;padding:28px 18px 80px;position:relative;z-index:1;}

header{text-align:center;margin-bottom:22px;}
.badge{display:inline-block;background:linear-gradient(135deg,#4f8ef720,#a78bfa20);border:1px solid #4f8ef740;border-radius:50px;padding:5px 16px;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
h1{font-family:'Nunito',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:900;background:linear-gradient(135deg,#4f8ef7,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin-bottom:6px;}
.subtitle{color:var(--muted);font-size:14px;}

.cb{border-radius:14px;padding:16px 20px;margin-bottom:10px;display:flex;gap:13px;align-items:flex-start;background:linear-gradient(135deg,#2d1a0a,#1e1508);border:1px solid #fb923c30;}
.ci{font-size:24px;flex-shrink:0;margin-top:1px;}
.cb h3{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;color:var(--orange);}
.cb p{font-size:13px;color:#b0b8d4;line-height:1.65;}
.cb strong{color:var(--yellow);}

.panel{background:var(--panel);border:1px solid #ffffff0d;border-radius:18px;padding:20px;margin-bottom:16px;}
.pt{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.pt::before{content:'';display:inline-block;width:3px;height:13px;border-radius:2px;background:var(--orange);}

.cfgr{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.cfi{display:flex;flex-direction:column;gap:4px;}
.cfi label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.cfi input[type=number]{background:var(--panel2);border:1px solid #ffffff15;border-radius:9px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:7px 12px;width:82px;outline:none;transition:border-color .2s;}
.cfi input:focus{border-color:var(--accent);}

.btn{border:none;border-radius:11px;cursor:pointer;font-family:'Nunito','Noto Sans TC',sans-serif;font-size:13px;font-weight:800;padding:9px 18px;transition:all .18s;}
.bp{background:linear-gradient(135deg,#4f8ef7,#7c6cf5);color:#fff;box-shadow:0 3px 12px #4f8ef740;}
.bp:hover{transform:translateY(-2px);}
.bg2{background:var(--panel2);color:var(--muted);border:1px solid #ffffff10;}
.bg2:hover{color:var(--text);border-color:#ffffff30;}
.bo{background:linear-gradient(135deg,#c2410c,#fb923c);color:#fff;}
.bo:hover{transform:translateY(-2px);}
.bdemo{background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff;box-shadow:0 3px 12px #8b5cf640;}
.bdemo:hover{transform:translateY(-2px);}
.bdemo.on{background:linear-gradient(135deg,#dc2626,#ef4444);box-shadow:0 3px 12px #ef444440;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;}

.tdisp{display:flex;align-items:center;gap:10px;background:var(--panel2);border-radius:13px;padding:10px 16px;margin-bottom:14px;border:1px solid #ffffff0f;}
.tlbl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.tval{font-family:'Nunito',sans-serif;font-size:25px;font-weight:900;color:var(--yellow);text-shadow:0 0 18px #fbbf2450;}
.mpill{font-size:11px;font-weight:800;padding:3px 11px;border-radius:50px;margin-left:auto;background:#fb923c20;color:var(--orange);border:1px solid #fb923c40;}

.si{display:grid;gap:9px;margin-bottom:14px;}
.sg2{grid-template-columns:repeat(2,1fr);}
.sc{background:var(--panel2);border-radius:13px;padding:11px 13px;border:1px solid #ffffff08;text-align:center;}
.scl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.scv{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;}

.lin-prog{background:var(--panel2);border-radius:12px;padding:10px 14px;margin-bottom:14px;border:1px solid #fb923c20;}
.lpt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.lpl{font-size:11px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:1px;}
.lpc{font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:var(--text);}
.lpb{background:#ffffff10;border-radius:50px;height:8px;overflow:hidden;}
.lpbf{height:100%;border-radius:50px;background:linear-gradient(90deg,#c2410c,var(--orange));transition:width .4s;}
.lwh{font-size:11px;color:var(--muted);margin-top:5px;font-weight:600;}
.lwh b{color:var(--red);}

.aw{overflow-x:auto;padding:4px 0 8px;}
.at{display:flex;gap:0;min-width:fit-content;padding-top:24px;padding-bottom:24px;align-items:center;}
.cw{display:flex;flex-direction:column;align-items:center;width:52px;flex-shrink:0;}
.cl{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:2px;height:14px;display:flex;align-items:center;justify-content:center;}
.cell{width:44px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;border:2px solid transparent;transition:all .32s cubic-bezier(.34,1.56,.64,1);background:var(--panel2);color:#8899bb;}
.cell.active{color:var(--text);border-color:#ffffff15;}
.cell.cur-l{border-color:var(--orange);background:#fb923c20;color:var(--orange);box-shadow:0 0 16px #fb923c45;transform:scale(1.09);}
.cell.cur-pulse{border-color:var(--green);background:#34d39930;color:var(--green);box-shadow:0 0 20px #34d39975;transform:scale(1.14);}
.cell.chk-l{background:#1e1208;color:#4a2a10;border-color:transparent;transform:scale(0.86);}
@keyframes scan{0%{box-shadow:0 0 0 0 #fb923c60}70%{box-shadow:0 0 0 10px #fb923c00}100%{box-shadow:0 0 0 0 #fb923c00}}
.cell.scanning{animation:scan .5s ease-out;}
.cell.found{border-color:var(--green);background:#34d39930;color:var(--green);box-shadow:0 0 20px #34d39975;transform:scale(1.14);}
.cell.elim{background:var(--elim);color:#1e2850;border-color:transparent;transform:scale(0.86);}
.ci2{font-size:10px;color:var(--muted);margin-top:3px;font-family:'Nunito',sans-serif;font-weight:700;}
.cal{height:15px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:2px;border-radius:5px;padding:0 3px;min-width:34px;}
.cal.done{color:var(--orange);background:#fb923c15;}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:9px;}
.li{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--muted);}
.ld{width:10px;height:10px;border-radius:3px;border:2px solid;}

.pred-sec{background:var(--panel2);border:1px solid #8b5cf630;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:none;animation:fi .3s;}
.pred-sec.show{display:block;}
.pred-sec .pred-q{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;}
.pred-sec .pred-opts{display:flex;gap:6px;flex-wrap:wrap;}
.pred-sec .pred-opt{padding:6px 14px;border:2px solid #ffffff15;border-radius:9px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--muted);background:transparent;transition:all .18s;}
.pred-sec .pred-opt:hover{border-color:#8b5cf6;color:#8b5cf6;}
.pred-sec .pred-opt.sel{border-color:var(--green);color:var(--green);background:#34d39920;}

.cq{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.6;}
.cq .cv{color:var(--orange);font-size:16px;}
.cq .tv{color:var(--yellow);font-size:16px;}
.cbtns{display:flex;gap:9px;flex-wrap:wrap;}
.cbtn{flex:1;min-width:110px;padding:11px 12px;border:2px solid transparent;border-radius:13px;cursor:pointer;font-family:'Nunito','Noto Sans TC',sans-serif;font-size:12px;font-weight:800;transition:all .18s;text-align:center;line-height:1.4;}
.cb-N{background:#fb923c15;border-color:#fb923c40;color:var(--orange);}
.cb-N:hover{background:#fb923c30;border-color:var(--orange);transform:translateY(-2px);}
.cb-F{background:#34d39915;border-color:#34d39940;color:var(--green);}
.cb-F:hover{background:#34d39930;border-color:var(--green);transform:translateY(-2px);}
.cbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.cbtn.correct{background:#34d39930;border-color:var(--green);color:var(--green);animation:pg .5s;}
.cbtn.wrong{background:#f8717130;border-color:var(--red);color:var(--red);animation:sk .4s;}
.cbtn.locked{opacity:.2;cursor:not-allowed;transform:none;}
.cbtn.suggest{border-color:var(--green);background:#34d39940;color:var(--green);animation:ps 1s infinite;}
@keyframes pg{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes sk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes ps{0%,100%{opacity:1}50%{opacity:.5}}

.fb{border-radius:11px;padding:10px 13px;font-size:12px;font-weight:700;margin-top:10px;display:none;align-items:center;gap:8px;line-height:1.5;}
.fb.show{display:flex;animation:fi .3s;}
.fb.correct{background:#34d39920;border:1px solid #34d39960;color:var(--green);}
.fb.wrong{background:#f8717120;border:1px solid #f8717160;color:#f87171;}

.hint-box{border-radius:10px;padding:10px 13px;font-size:13px;font-weight:600;margin-top:8px;margin-bottom:10px;display:none;align-items:flex-start;gap:8px;line-height:1.5;background:#fbbf2415;border:1px solid #fbbf2440;color:var(--yellow);animation:fi .3s;}
.hint-box.show{display:flex;}

.res-ov{background:var(--panel2);border-radius:18px;padding:24px;text-align:center;border:2px solid var(--green);box-shadow:0 0 36px #34d39925;animation:fi .4s;display:none;}
.res-ov.show{display:block;}
.res-ov.nf{border-color:var(--red);box-shadow:0 0 36px #f8717125;}
.re{font-size:44px;margin-bottom:9px;}
.rt{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;margin-bottom:7px;}
.rt.found{color:var(--green);}.rt.nf{color:var(--red);}
.rd{color:var(--muted);font-size:12px;line-height:1.7;margin-bottom:14px;}
.srow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
.sp{background:#ffffff08;border-radius:50px;padding:4px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;}
.sp span{color:var(--yellow);}
.wr-rev{background:#f8717115;border:1px solid #f8717130;border-radius:11px;padding:11px 14px;margin-top:10px;font-size:12px;color:#f8b0b0;font-weight:600;line-height:1.6;}
.wr-rev b{color:var(--red);}
.pred-res{font-size:13px;font-weight:700;margin-top:10px;padding:10px 14px;border-radius:10px;background:var(--panel);border:1px solid #ffffff0a;display:none;line-height:1.5;}
.pred-res.show{display:block;}
.pred-res .hit{color:var(--green);}
.pred-res .miss{color:var(--orange);}

.stats-panel{background:var(--panel);border:1px solid #ffffff0d;border-radius:18px;padding:20px;margin-top:16px;display:none;}
.stats-panel.show{display:block;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stats-item{background:var(--panel2);border-radius:11px;padding:10px;text-align:center;border:1px solid #ffffff08;}
.stats-n{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:var(--text);}
.stats-l{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.stats-date{font-size:10px;color:var(--muted);margin-top:8px;font-weight:600;text-align:center;}
@media(max-width:500px){.stats-grid{grid-template-columns:repeat(2,1fr);}}

.log-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;padding-right:3px;}
.log-list::-webkit-scrollbar{width:3px;}
.log-list::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:3px;}
.le{background:var(--panel2);border-radius:9px;padding:8px 11px;font-size:11px;font-weight:600;display:flex;align-items:flex-start;gap:8px;border-left:3px solid transparent;animation:fi .3s;}
.le.ll{border-color:var(--orange);}
.le.cl{border-color:var(--green);}
.le.wl{border-color:var(--red);}
.lsn{color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;margin-top:1px;background:var(--orange);}
.ltx{color:#b0b8d4;line-height:1.5;}.ltx b{color:var(--text);}

#stepCtr{display:none;position:fixed;bottom:16px;right:16px;background:var(--panel);border:1px solid #ffffff10;border-radius:50px;padding:8px 15px;font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;color:var(--muted);z-index:100;box-shadow:0 4px 20px #00000060;}

@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="badge">循序搜尋 練習</div>
  <h1>🐢 循序搜尋</h1>
  <p class="subtitle">從頭一個一個比對，找到目標為止</p>
</header>

<div class="cb">
  <div class="ci">🐢</div>
  <div><h3>什麼是循序搜尋？</h3><p>從陣列的<strong>第一個元素</strong>開始，一個一個比對，直到找到目標值，或全部檢查完。<br>最壞情況：如果目標在最後或不存在，就要比對<strong>全部 n 個</strong>元素。</p></div>
</div>

<div class="panel">
  <div class="pt">題目設定</div>
  <div class="cfgr">
    <div class="cfi"><label>陣列大小</label><input type="number" id="arrSize" value="10" min="6" max="16"></div>
    <div class="cfi"><label>目標值（留空隨機）</label><input type="number" id="targetInput" value="" placeholder="自動"></div>
    <button class="btn bp" onclick="newProblem()">🎲 出新題目</button>
    <button class="btn bg2" onclick="newProblem(true)">找不存在的數</button>
    <button class="btn bo" onclick="newProblem('worst')">😱 最壞情況</button>
    <button class="btn bdemo" id="demoBtn" onclick="toggleDemo()">▶️ 自動演示</button>
  </div>
</div>

<div id="gameArea" style="display:none">

  <div class="tdisp">
    <div class="tlbl">🎯 目標</div>
    <div class="tval" id="tDisp">—</div>
    <div class="mpill">🐢 循序搜尋</div>
  </div>

  <div class="pred-sec" id="predSec">
    <div class="pred-q">🔮 你覺得總共需要檢查幾次？</div>
    <div class="pred-opts" id="predOpts"></div>
  </div>

  <div class="si sg2">
    <div class="sc"><div class="scl" style="color:var(--orange)">目前檢查位置</div><div class="scv" id="curPos" style="color:var(--orange)">—</div></div>
    <div class="sc"><div class="scl" style="color:var(--muted)">已檢查</div><div class="scv" id="chkCnt" style="color:var(--text)">0</div></div>
  </div>

  <div class="lin-prog">
    <div class="lpt"><div class="lpl">📊 掃描進度</div><div class="lpc"><span id="lpCnt">0</span>/<span id="lpTot">—</span> 格</div></div>
    <div class="lpb"><div class="lpbf" id="lpBar" style="width:0%"></div></div>
    <div class="lwh" id="lwh"></div>
  </div>

  <div class="panel">
    <div class="pt">陣列</div>
    <div class="aw"><div class="at" id="arrTrack"></div></div>
    <div class="legend">
      <div class="li"><div class="ld" style="border-color:var(--orange);background:#fb923c20"></div>目前比對</div>
      <div class="li"><div class="ld" style="border-color:var(--green);background:#34d39930"></div>找到！</div>
      <div class="li"><div class="ld" style="border-color:transparent;background:#1e1208"></div>已檢查</div>
      <div class="li"><div class="ld" style="border-color:#ffffff15;background:var(--panel2)"></div>未檢查</div>
    </div>
  </div>

  <div class="panel" id="choicePanel">
    <div class="pt">你的決定</div>
    <div class="cq" id="cq"></div>
    <div class="hint-box" id="hintBox"></div>
    <div class="cbtns" id="cbtns"></div>
    <div class="fb" id="fb"></div>
  </div>

  <div class="res-ov" id="resOv">
    <div class="re" id="re"></div>
    <div class="rt" id="rt2"></div>
    <div class="rd" id="rd"></div>
    <div class="srow" id="srow"></div>
    <div class="pred-res" id="predRes"></div>
    <div id="wrRev"></div>
    <button class="btn bp" id="nextBtn" onclick="nextAction()" style="margin-top:12px">再來一題 🎲</button>
  </div>

  <div class="panel" id="logPanel" style="display:none">
    <div class="pt">搜尋紀錄</div>
    <div class="log-list" id="logList"></div>
  </div>
</div>

<div id="stepCtr">第 <span id="stepNum">0</span> 步</div>

<div class="stats-panel" id="statsPanel">
  <div class="pt">📊 今日練習</div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="stats-date" id="statsDate"></div>
</div>

</div>

<script>
// ══════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════
let arr=[],target=0,linCur=0;
let stepCount=0,correctAns=0,wrongAns=0,stepWrong=0;
let gameOver=false,gameFoundAt=undefined,isWorstCase=false;
let checkOrder=[];
let demoMode=false,demoTimer=null,demoBusy=false;
const DEMO_MS=1200;
let predicted=null;

// ══════════════════════════════════════════════════════════
// Array Generation
// ══════════════════════════════════════════════════════════
function genArr(size,forceNF){
  const set=new Set();
  while(set.size<size)set.add(Math.floor(Math.random()*80)+5);
  arr=Array.from(set).sort((a,b)=>a-b);
  if(forceNF){
    let t,tr=0;
    do{t=Math.floor(Math.random()*80)+5;tr++;}
    while(arr.includes(t)&&tr<200);
    target=arr.includes(t)?arr[arr.length-1]+3:t;
  }else{
    const inp=parseInt(document.getElementById('targetInput').value);
    target=isNaN(inp)?(Math.random()<0.8?arr[Math.floor(Math.random()*arr.length)]:(()=>{let t,tr=0;do{t=Math.floor(Math.random()*80)+5;tr++;}while(arr.includes(t)&&tr<200);return t;})()):inp;
  }
}

function newProblem(type){
  if(demoMode)stopDemo();
  isWorstCase=(type==='worst');
  predicted=null;checkOrder=[];
  const size=Math.max(6,Math.min(16,parseInt(document.getElementById('arrSize').value)||10));
  genArr(size,!!type);
  if(type==='worst')target=arr[arr.length-1]+1;
  startGame();
}

// ══════════════════════════════════════════════════════════
// Game Start
// ══════════════════════════════════════════════════════════
function startGame(){
  if(demoMode)stopDemo();
  linCur=0;stepCount=0;correctAns=0;wrongAns=0;stepWrong=0;
  gameOver=false;gameFoundAt=undefined;
  document.getElementById('gameArea').style.display='block';
  document.getElementById('resOv').style.display='none';
  document.getElementById('choicePanel').style.display='block';
  document.getElementById('logPanel').style.display='none';
  document.getElementById('stepCtr').style.display='block';
  document.getElementById('logList').innerHTML='';
  document.getElementById('fb').className='fb';
  document.getElementById('wrRev').innerHTML='';
  document.getElementById('hintBox').className='hint-box';
  document.getElementById('stepNum').style.color='var(--orange)';

  addLog(`開始循序搜尋，陣列有 ${arr.length} 格，目標值 <b>${target}</b>。從 [0] 開始逐一比對。`,'ll');
  document.addEventListener('keydown',onKey);
  renderAll();renderQ();showPrediction();
}

// ══════════════════════════════════════════════════════════
// Rendering
// ══════════════════════════════════════════════════════════
function renderAll(){
  document.getElementById('tDisp').textContent=target;
  document.getElementById('stepNum').textContent=stepCount;
  document.getElementById('curPos').textContent=gameOver?'—':`${arr[linCur]??'?'}[${linCur}]`;
  document.getElementById('chkCnt').textContent=gameOver?stepCount:linCur;

  updateLinProg();
  const track=document.getElementById('arrTrack');track.innerHTML='';
  for(let i=0;i<arr.length;i++){
    const w=el('div','cw'),tl=el('div','cl'),cell=el('div','cell'),idx=el('div','ci2'),cal=el('div','cal');
    idx.textContent=i;
    if(gameOver){
      if(gameFoundAt===i){cell.classList.add('found');tl.innerHTML='<span style="color:var(--green);font-size:9px">✓ 找到</span>';}
      else if(i<(gameFoundAt??stepCount)){cell.classList.add('chk-l');}
      else {cell.classList.add('elim');}
      if(checkOrder[i]){cal.textContent='第'+checkOrder[i]+'次';cal.classList.add('done');}
    }else{
      if(i<linCur){cell.classList.add('chk-l');}
      else if(i===linCur){cell.classList.add('cur-l');cell.classList.add('scanning');tl.innerHTML='<span style="color:var(--orange);font-size:9px">▼ 檢查中</span>';}
      else {cell.classList.add('active');}
    }
    cell.textContent=arr[i];
    w.appendChild(tl);w.appendChild(cell);w.appendChild(idx);w.appendChild(cal);track.appendChild(w);
  }
}

function updateLinProg(){
  const pct=Math.round((linCur/arr.length)*100);
  document.getElementById('lpCnt').textContent=linCur;
  document.getElementById('lpTot').textContent=arr.length;
  document.getElementById('lpBar').style.width=pct+'%';
  const wh=document.getElementById('lwh');
  if(linCur===0)wh.innerHTML=`<b>最壞情況</b>：目標在最後或不存在 → 要比對 <b>${arr.length}</b> 次`;
  else wh.innerHTML=`已檢查 ${linCur} 格，還剩 <b>${arr.length-linCur}</b> 格`;
}

function renderQ(){
  if(gameOver)return;
  stepWrong=0;
  document.getElementById('fb').className='fb';
  document.getElementById('hintBox').className='hint-box';
  const q=document.getElementById('cq'),bc=document.getElementById('cbtns');bc.innerHTML='';
  q.innerHTML=`目前檢查 [<b>${linCur}</b>]，值是 <span class="cv">${arr[linCur]}</span>，目標是 <span class="tv">${target}</span>。<br>這個值符合目標嗎？`;
  bc.appendChild(mkBtn('cbtn cb-F','✅ [1] 找到了！<br><small>'+arr[linCur]+' = '+target+'</small>','found'));
  bc.appendChild(mkBtn('cbtn cb-N','➡️ [2] 繼續往後<br><small>'+arr[linCur]+' ≠ '+target+'</small>','next'));
}

function el(tag,cls){const e=document.createElement(tag);e.className=cls;return e;}
function mkBtn(cls,html,action){const b=document.createElement('button');b.className=cls;b.innerHTML=html;b.dataset.action=action;b.onclick=()=>linChoice(action);return b;}

// ══════════════════════════════════════════════════════════
// Choices & Logic
// ══════════════════════════════════════════════════════════
function linChoice(ch){
  if(demoMode&&!demoBusy)return;
  const correct=arr[linCur]===target?'found':'next';
  const btns=document.getElementById('cbtns').querySelectorAll('.cbtn');
  const idx=Array.from(btns).findIndex(b=>b.dataset.action===ch);
  proc(ch,correct,btns,idx,
    ()=>{
      checkOrder[linCur]=stepCount;
      if(ch==='found'){
        showFb(true,`正確！${arr[linCur]} = ${target}，找到了！`);
        addLog(`第${stepCount}步：[${linCur}] = ${arr[linCur]} = 目標，<b>找到了</b>！`,'cl');
        setTimeout(()=>endGame(true,linCur),700);
      }else{
        showFb(true,`正確！${arr[linCur]} ≠ ${target}，檢查下一格 [${linCur+1}]`);
        addLog(`第${stepCount}步：[${linCur}] = ${arr[linCur]} ≠ ${target}，繼續往後`,'ll');
        setTimeout(()=>{
          linCur++;
          if(linCur>=arr.length){endGame(false);return;}
          renderAll();renderQ();
          if(demoMode)demoTimer=setTimeout(doDemoStep,DEMO_MS);
        },700);
      }
    },
    ()=>{
      showFb(false,`再想想！目標是 ${target}，[${linCur}] 的值是 ${arr[linCur]}，它們一樣嗎？`);
      document.getElementById('hintBox').className='hint-box';
      if(stepWrong>=2){
        setTimeout(()=>{
          const h=document.getElementById('hintBox');
          h.className='hint-box show';
          h.innerHTML='💡 看一下：<b>['+linCur+'] = '+arr[linCur]+'</b>，目標是 <b>'+target+'</b>，兩個數字『一樣』還是『不一樣』？';
        },600);
      }
      if(stepWrong>=3){
        setTimeout(()=>suggestAnswer(),800);
      }
      setTimeout(()=>{
        btns.forEach(b=>{b.disabled=false;b.classList.remove('wrong','correct','suggest');});
        document.getElementById('fb').className='fb';
        stepCount--;document.getElementById('stepNum').textContent=stepCount;
        addLog(`第${stepCount+1}步答錯`,'wl');
      },1200);
    }
  );
}

function proc(ch,correct,btns,idx,onOk,onErr){
  btns.forEach(b=>b.disabled=true);stepCount++;document.getElementById('stepNum').textContent=stepCount;
  if(idx<0) return;
  if(ch===correct){correctAns++;btns[idx].classList.add('correct');onOk();}
  else{wrongAns++;stepWrong++;btns[idx].classList.add('wrong');onErr();}
}

function suggestAnswer(){
  const btns=document.getElementById('cbtns').querySelectorAll('.cbtn');
  const correct=arr[linCur]===target?'found':'next';
  const idx=correct==='found'?0:1;
  btns.forEach(b=>b.classList.remove('suggest'));
  btns[idx].classList.add('suggest');
  const h=document.getElementById('hintBox');
  h.className='hint-box show';
  h.innerHTML='💡 <b>答案提示</b>：目前值 = '+arr[linCur]+'，目標 = '+target+'，兩者'+(correct==='found'?'<b>相等</b>，選「找到了」！':'<b>不相等</b>，選「繼續往後」！');
}

function showFb(ok,txt){const fb=document.getElementById('fb');fb.className='fb '+(ok?'correct':'wrong')+' show';fb.innerHTML=(ok?'✅ ':'❌ ')+'<div>'+txt+'</div>';}

function onKey(e){
  if(gameOver||demoMode)return;
  if(e.key==='1')linChoice('found');
  else if(e.key==='2')linChoice('next');
}

// ══════════════════════════════════════════════════════════
// End Game
// ══════════════════════════════════════════════════════════
function endGame(found,foundIdx){
  document.removeEventListener('keydown',onKey);
  gameOver=true;gameFoundAt=found?foundIdx:undefined;
  if(demoMode)stopDemo();
  renderAll();
  document.getElementById('choicePanel').style.display='none';
  document.getElementById('logPanel').style.display='block';
  document.getElementById('predSec').className='pred-sec';

  const ov=document.getElementById('resOv');
  ov.style.display='block';ov.className='res-ov show'+(found?'':' nf');
  document.getElementById('re').textContent=found?'🎉':'🔍';
  document.getElementById('rt2').className='rt '+(found?'found':'nf');
  document.getElementById('rt2').textContent=found?'找到了！':'找不到！';
  document.getElementById('rd').innerHTML=found?`目標值 <b>${target}</b> 在索引 [<b>${foundIdx}</b>]。共 <b>${stepCount}</b> 步。`: `目標值 <b>${target}</b> 不在陣列中。檢查了全部 <b>${stepCount}</b> 格確定。`;
  document.getElementById('srow').innerHTML=`<div class="sp">✅ 答對 <span>${correctAns}</span></div><div class="sp">❌ 答錯 <span>${wrongAns}</span></div><div class="sp">🔢 共 <span>${stepCount}</span> 步</div>`;

  if(isWorstCase){
    document.getElementById('wrRev').innerHTML=`<div class="wr-rev">😱 這就是循序搜尋的<b>最壞情況</b>！比對了<b>${stepCount}</b> 次，掃過全部 ${arr.length} 格。</div>`;
  }else if(!found){
    document.getElementById('wrRev').innerHTML=`<div class="wr-rev">🔍 目標不存在，所以檢查了<b>全部 ${arr.length} 格</b>才確定。最壞情況跟「目標在最後一格」一樣，都需要比對全部。</div>`;
  }

  showPredResult();
  saveStats(found,stepCount,wrongAns);
  updateStatsUI();

  addLog(found?`🐢 第${stepCount}步：找到 ${target} 在 [${foundIdx}]！`:`🐢 搜尋結束，${target} 不存在。`,'cl');
}

function nextAction(){newProblem();}

// ══════════════════════════════════════════════════════════
// Demo
// ══════════════════════════════════════════════════════════
function toggleDemo(){
  if(gameOver)return;
  if(demoMode){stopDemo();}
  else{startDemo();}
}

function startDemo(){
  demoMode=true;
  document.getElementById('demoBtn').textContent='⏹️ 停止演示';
  document.getElementById('demoBtn').classList.add('on');
  document.querySelectorAll('.cbtn').forEach(b=>b.disabled=true);
  document.getElementById('predSec').className='pred-sec';
  doDemoStep();
}

function stopDemo(){
  demoMode=false;
  if(demoTimer){clearTimeout(demoTimer);demoTimer=null;}
  document.getElementById('demoBtn').textContent='▶️ 自動演示';
  document.getElementById('demoBtn').classList.remove('on');
  if(!gameOver)document.querySelectorAll('.cbtn').forEach(b=>b.disabled=false);
}

function doDemoStep(){
  if(!demoMode||gameOver){stopDemo();return;}
  demoBusy=true;
  const correct=arr[linCur]===target?'found':'next';
  linChoice(correct);
  demoBusy=false;
}

// ══════════════════════════════════════════════════════════
// Prediction
// ══════════════════════════════════════════════════════════
function showPrediction(){
  const sec=document.getElementById('predSec');
  if(gameOver){sec.className='pred-sec';return;}
  const n=arr.length;
  const opts=[];for(let i=1;i<=4;i++)opts.push(Math.max(1,Math.ceil(n*i/4)));
  const labels=opts.map(v=>v+'次');
  const c=document.getElementById('predOpts');c.innerHTML='';
  opts.forEach((v,i)=>{
    const b=document.createElement('button');b.className='pred-opt';b.textContent=labels[i];
    b.onclick=()=>{document.querySelectorAll('#predOpts .pred-opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');predicted=v;};
    c.appendChild(b);
  });
  sec.className='pred-sec show';
}

function showPredResult(){
  const pr=document.getElementById('predRes');
  if(predicted===null){pr.className='pred-res';return;}
  const diff=stepCount-predicted;
  let txt='';
  if(diff===0)txt='<span class="hit">🎯 完全正確！你猜中了 '+predicted+' 次！</span>';
  else if(diff>0)txt='你猜 <b>'+predicted+'</b> 次，實際 <b>'+stepCount+'</b> 次，差了 <span class="miss">'+diff+'</span> 次。循序搜尋往往比想像中花更多步！';
  else txt='你猜 <b>'+predicted+'</b> 次，實際 <b>'+stepCount+'</b> 次，你多估了 <span class="miss">'+Math.abs(diff)+'</span> 次。繼續練習會越來越有感覺！';
  pr.innerHTML='🔮 預測結果：'+txt;
  pr.className='pred-res show';
}

// ══════════════════════════════════════════════════════════
// Stats (localStorage)
// ══════════════════════════════════════════════════════════
function loadStats(){
  try{
    const raw=localStorage.getItem('linear_practice_stats');
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

function saveStats(found,steps,wrong){
  const today=new Date().toISOString().slice(0,10);
  let st=loadStats();
  if(!st||st.date!==today){
    st={date:today,total:0,found:0,notFound:0,steps:0,wrong:0,best:999};
  }
  st.total++;if(found)st.found++;else st.notFound++;
  st.steps+=steps;st.wrong+=wrong;
  if(steps<st.best)st.best=steps;
  try{localStorage.setItem('linear_practice_stats',JSON.stringify(st));}catch(e){}
}

function updateStatsUI(){
  const st=loadStats();
  const panel=document.getElementById('statsPanel');
  if(!st){panel.className='stats-panel';return;}
  panel.className='stats-panel show';
  const grid=document.getElementById('statsGrid');
  grid.innerHTML=
    `<div class="stats-item"><div class="stats-n">${st.total}</div><div class="stats-l">練習題數</div></div>`+
    `<div class="stats-item"><div class="stats-n" style="color:var(--green)">${st.found}</div><div class="stats-l">找到</div></div>`+
    `<div class="stats-item"><div class="stats-n" style="color:var(--red)">${st.notFound}</div><div class="stats-l">找不到</div></div>`+
    `<div class="stats-item"><div class="stats-n">${st.best<999?st.best:'—'}</div><div class="stats-l">最少步數</div></div>`;
  document.getElementById('statsDate').textContent='📅 '+st.date+' ｜ 平均 '+Math.round(st.steps/st.total)+' 步/題 ｜ 共錯 '+st.wrong+' 次';
}

// ══════════════════════════════════════════════════════════
// Log
// ══════════════════════════════════════════════════════════
function addLog(text,cls){
  document.getElementById('logPanel').style.display='block';
  const list=document.getElementById('logList');
  const e=document.createElement('div');e.className='le '+cls;
  const n=document.createElement('div');n.className='lsn';n.textContent=list.children.length+1;
  const t=document.createElement('div');t.className='ltx';t.innerHTML=text;
  e.appendChild(n);e.appendChild(t);list.appendChild(e);list.scrollTop=list.scrollHeight;
}

// ══════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════
window.onload=()=>{
  updateStatsUI();
  newProblem();
};
</script>
